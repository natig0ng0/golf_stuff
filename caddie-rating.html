<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caddie Ratings</title>
  <meta name="description" content="Caddie rating system" />

  <!-- Tailwind (Play CDN with JIT + arbitrary values) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel standalone (compiles JSX in browser; fine for a POC) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body { margin: 0; background: #f7f4ec; }
    #root { min-height: 100vh; }
    .font-display { font-family: 'Cormorant Garamond', Georgia, serif; letter-spacing: -0.01em; }
    .font-body    { font-family: 'Outfit', -apple-system, sans-serif; }
    .crest-bg {
      background-image:
        radial-gradient(circle at 20% 10%, rgba(184,147,90,0.06), transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(31,58,46,0.08), transparent 45%);
    }
    /* Initial loading splash so the page isn't blank during Babel compile */
    .boot-splash {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', Georgia, serif; color: #1f3a2e; font-size: 28px;
      background: #f7f4ec;
    }
  </style>

  <!-- Import map for React + Lucide via CDN -->
  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "lucide-react":     "https://esm.sh/lucide-react@0.383.0?deps=react@18.3.1",
      "xlsx":             "https://esm.sh/xlsx@0.18.5"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div class="boot-splash">Loading…</div>
  </div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Star, Plus, Users, BarChart3, ChevronLeft, Lock, Calendar, Trophy,
      Trash2, Award, CheckCircle2, AlertCircle, ChevronRight, Flag, X,
      Settings, Upload, Download, KeyRound, FileSpreadsheet,
    } from 'lucide-react';
    import * as XLSX from 'xlsx';

    /* ============================================================
       CONFIG
       ============================================================ */
    const DEFAULT_PASSWORD = 'admin1960'; // first-run password; change it in-app under Settings

    const METRICS = [
      { key: 'knowledge',      label: 'Knowledge of the Game' },
      { key: 'ballVision',     label: 'Ability to See the Ball' },
      { key: 'politeness',     label: 'Politeness' },
      { key: 'responsiveness', label: 'Responsiveness / Proactiveness' },
      { key: 'clubCare',       label: 'Golf Club Care' },
      { key: 'bunkerCare',     label: 'Raking & Repairing Bunkers' },
      { key: 'divotFilling',   label: 'Divot Filling' },
      { key: 'pitchRepair',    label: 'Pitch Mark Repair' },
    ];

    const ROUND_TYPES = [
      'Stroke Play', 'Match Play', 'Stableford', 'Scramble',
      'Practice Round', 'Tournament',
    ];

    /* ============================================================
       STORAGE — localStorage (POC; per-browser only)
       ============================================================ */
    const loadKey = (key, fallback) => {
      try {
        const v = localStorage.getItem(`caddie_${key}`);
        return v ? JSON.parse(v) : fallback;
      } catch { return fallback; }
    };
    const saveKey = (key, value) => {
      try { localStorage.setItem(`caddie_${key}`, JSON.stringify(value)); }
      catch (e) { console.error(e); }
    };

    /* ============================================================
       UTIL
       ============================================================ */
    const uid  = (p) => `${p}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    const fmt1 = (n) => (Math.round(n * 10) / 10).toFixed(1);

    /* ============================================================
       STAR RATING
       ============================================================ */
    function StarRating({ value, onChange, size = 30 }) {
      const [hover, setHover] = useState(0);
      const display = hover || value;
      return (
        <div className="flex gap-1.5" onMouseLeave={() => setHover(0)}>
          {[1, 2, 3, 4, 5].map((n) => (
            <button
              key={n}
              type="button"
              onClick={() => onChange(n)}
              onMouseEnter={() => setHover(n)}
              className="transition-transform hover:scale-110 active:scale-95 cursor-pointer"
              aria-label={`${n} star${n > 1 ? 's' : ''}`}
            >
              <Star
                size={size}
                strokeWidth={1.5}
                className={n <= display
                  ? 'fill-amber-500 text-amber-500'
                  : 'fill-stone-100 text-stone-300'}
              />
            </button>
          ))}
        </div>
      );
    }

    /* ============================================================
       RATER VIEW
       ============================================================ */
    function RaterView({ caddies, addRating }) {
      const empty = {
        caddieId: '',
        date: new Date().toISOString().slice(0, 10),
        roundType: 'Stroke Play',
        knowledge: 0, ballVision: 0, politeness: 0, responsiveness: 0, clubCare: 0,
        bunkerCare: 0, divotFilling: 0, pitchRepair: 0,
        comments: '', raterName: '',
      };
      const [form, setForm] = useState(empty);
      const [status, setStatus] = useState(null);
      const [submitting, setSubmitting] = useState(false);

      const allRated = METRICS.every((m) => form[m.key] > 0);
      const canSubmit = form.caddieId && allRated && !submitting;

      const submit = () => {
        if (!form.caddieId) return setStatus({ type: 'err', msg: 'Please select a caddie.' });
        if (!allRated) return setStatus({ type: 'err', msg: 'Please rate every metric.' });
        setSubmitting(true);
        addRating({ id: uid('rt'), ...form, submittedAt: new Date().toISOString() });
        setSubmitting(false);
        setForm(empty);
        setStatus({ type: 'ok', msg: 'Thank you. Your rating has been recorded.' });
        setTimeout(() => setStatus(null), 4000);
      };

      return (
        <div className="max-w-2xl mx-auto px-4 md:px-6 py-8 md:py-12">
          <div className="text-center mb-10">
            <div className="inline-flex items-center justify-center w-14 h-14 rounded-full bg-[#1f3a2e] mb-5">
              <Flag className="text-amber-400" size={26} strokeWidth={1.5} />
            </div>
            <h1 className="font-display text-4xl md:text-5xl text-[#1f3a2e] mb-2">Rate Your Caddie</h1>
            <p className="font-body text-stone-600 text-sm tracking-wide uppercase">
              Help us recognise excellence on the course
            </p>
          </div>

          <div className="bg-white rounded-sm shadow-lg shadow-stone-200/50 border border-stone-200/70">
            <div className="px-6 md:px-10 pt-8 pb-6 border-b border-stone-100">
              <h2 className="font-display text-xl text-[#1f3a2e] mb-5">Round Details</h2>
              <div className="space-y-4">
                <div>
                  <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Caddie</label>
                  <select
                    value={form.caddieId}
                    onChange={(e) => setForm({ ...form, caddieId: e.target.value })}
                    className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm bg-white focus:outline-none focus:border-[#1f3a2e] text-stone-800"
                  >
                    <option value="">— Select a caddie —</option>
                    {caddies.map((c) => (
                      <option key={c.id} value={c.id}>
                        {c.bib ? `#${c.bib} · ` : ''}{c.name}
                      </option>
                    ))}
                  </select>
                  {caddies.length === 0 && (
                    <p className="font-body text-xs text-amber-700 mt-2 flex items-center gap-1">
                      <AlertCircle size={12} /> No caddies yet. Ask admin to add them.
                    </p>
                  )}
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Date</label>
                    <input
                      type="date"
                      value={form.date}
                      onChange={(e) => setForm({ ...form, date: e.target.value })}
                      className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e] text-stone-800"
                    />
                  </div>
                  <div>
                    <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Round Type</label>
                    <select
                      value={form.roundType}
                      onChange={(e) => setForm({ ...form, roundType: e.target.value })}
                      className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm bg-white focus:outline-none focus:border-[#1f3a2e] text-stone-800"
                    >
                      {ROUND_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <div className="px-6 md:px-10 py-8 border-b border-stone-100">
              <h2 className="font-display text-xl text-[#1f3a2e] mb-5">Performance</h2>
              <div className="space-y-5">
                {METRICS.map((m) => (
                  <div key={m.key} className="flex items-center justify-between gap-4">
                    <span className="font-body text-stone-800 text-[15px]">{m.label}</span>
                    <StarRating value={form[m.key]} onChange={(v) => setForm({ ...form, [m.key]: v })} />
                  </div>
                ))}
              </div>
            </div>

            <div className="px-6 md:px-10 py-8">
              <h2 className="font-display text-xl text-[#1f3a2e] mb-5">Additional <span className="text-stone-400 text-base italic">(optional)</span></h2>
              <div className="space-y-4">
                <div>
                  <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Your Name</label>
                  <input
                    type="text"
                    value={form.raterName}
                    onChange={(e) => setForm({ ...form, raterName: e.target.value })}
                    placeholder="Anonymous"
                    className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e] text-stone-800"
                  />
                </div>
                <div>
                  <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Comments</label>
                  <textarea
                    rows={3}
                    value={form.comments}
                    onChange={(e) => setForm({ ...form, comments: e.target.value })}
                    placeholder="Any standout moments or feedback…"
                    className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e] resize-none text-stone-800"
                  />
                </div>
              </div>
            </div>

            <div className="px-6 md:px-10 pb-8">
              {status && (
                <div className={`mb-4 p-3 rounded-sm flex items-center gap-2 font-body text-sm ${
                  status.type === 'ok'
                    ? 'bg-emerald-50 text-emerald-800 border border-emerald-200'
                    : 'bg-rose-50 text-rose-800 border border-rose-200'
                }`}>
                  {status.type === 'ok' ? <CheckCircle2 size={16} /> : <AlertCircle size={16} />}
                  {status.msg}
                </div>
              )}
              <button
                onClick={submit}
                disabled={!canSubmit}
                className="w-full py-4 bg-[#1f3a2e] hover:bg-[#2a4f3e] disabled:bg-stone-300 disabled:cursor-not-allowed text-white font-body uppercase tracking-[0.2em] text-sm transition-colors rounded-sm"
              >
                {submitting ? 'Submitting…' : 'Submit Rating'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       ADMIN: PASSWORD GATE
       ============================================================ */
    function PasswordGate({ onUnlock, onCancel }) {
      const [pw, setPw] = useState('');
      const [err, setErr] = useState(false);
      const check = () => {
        const stored = loadKey('adminPassword', DEFAULT_PASSWORD);
        if (pw === stored) onUnlock();
        else { setErr(true); setTimeout(() => setErr(false), 1500); }
      };
      return (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4">
          <div className="bg-white rounded-sm p-8 max-w-sm w-full shadow-2xl">
            <div className="flex items-center justify-between mb-6">
              <div className="flex items-center gap-2">
                <Lock size={18} className="text-[#1f3a2e]" />
                <h3 className="font-display text-xl text-[#1f3a2e]">Admin Access</h3>
              </div>
              <button onClick={onCancel} className="text-stone-400 hover:text-stone-600">
                <X size={18} />
              </button>
            </div>
            <input
              type="password"
              value={pw}
              autoFocus
              onChange={(e) => setPw(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && check()}
              placeholder="Enter password"
              className={`font-body w-full px-4 py-3 border-2 rounded-sm focus:outline-none mb-4 ${
                err ? 'border-rose-500 bg-rose-50' : 'border-stone-300 focus:border-[#1f3a2e]'
              }`}
            />
            {err && <p className="font-body text-xs text-rose-600 -mt-2 mb-3">Incorrect password.</p>}
            <button
              onClick={check}
              className="w-full py-3 bg-[#1f3a2e] hover:bg-[#2a4f3e] text-white font-body uppercase tracking-[0.2em] text-sm rounded-sm"
            >
              Unlock
            </button>
          </div>
        </div>
      );
    }

    /* ============================================================
       ADMIN VIEW
       ============================================================ */
    function AdminView({ caddies, ratings, addCaddie, addCaddiesBulk, deleteCaddie, deleteRating }) {
      const [tab, setTab] = useState('overview');
      const [selectedId, setSelectedId] = useState(null);

      const statsByCaddie = useMemo(() => {
        const map = {};
        caddies.forEach((c) => {
          const r = ratings.filter((x) => x.caddieId === c.id);
          if (r.length === 0) { map[c.id] = { count: 0, overall: 0, byMetric: {} }; return; }
          const byMetric = {};
          METRICS.forEach((m) => {
            byMetric[m.key] = r.reduce((s, x) => s + (x[m.key] || 0), 0) / r.length;
          });
          const overall = Object.values(byMetric).reduce((a, b) => a + b, 0) / METRICS.length;
          map[c.id] = { count: r.length, overall, byMetric };
        });
        return map;
      }, [caddies, ratings]);

      const totalRatings = ratings.length;
      const overallAvg = totalRatings === 0 ? 0
        : caddies.reduce((s, c) => s + (statsByCaddie[c.id]?.overall || 0) * (statsByCaddie[c.id]?.count || 0), 0)
          / Math.max(1, ratings.length);

      if (tab === 'caddie' && selectedId) {
        const caddie = caddies.find((c) => c.id === selectedId);
        const stats = statsByCaddie[selectedId] || { count: 0, overall: 0, byMetric: {} };
        const caddieRatings = ratings
          .filter((r) => r.caddieId === selectedId)
          .sort((a, b) => b.submittedAt.localeCompare(a.submittedAt));

        return (
          <div className="max-w-5xl mx-auto px-4 md:px-6 py-8">
            <button
              onClick={() => { setTab('overview'); setSelectedId(null); }}
              className="font-body text-sm text-stone-600 hover:text-[#1f3a2e] flex items-center gap-1 mb-6"
            >
              <ChevronLeft size={16} /> Back to overview
            </button>

            <div className="bg-white rounded-sm border border-stone-200 p-6 md:p-10 mb-6">
              <div className="flex items-start justify-between mb-6 flex-wrap gap-4">
                <div>
                  <div className="font-body text-xs uppercase tracking-wider text-stone-500 mb-1">
                    {caddie.bib ? `Bib #${caddie.bib}` : 'Caddie'}
                  </div>
                  <h2 className="font-display text-4xl text-[#1f3a2e]">{caddie.name}</h2>
                </div>
                <div className="text-right">
                  <div className="font-display text-5xl text-[#b8935a]">{fmt1(stats.overall)}</div>
                  <div className="font-body text-xs uppercase tracking-wider text-stone-500">
                    {stats.count} {stats.count === 1 ? 'rating' : 'ratings'}
                  </div>
                </div>
              </div>

              {(caddie.age || caddie.sex || caddie.phone) && (
                <div className="flex flex-wrap gap-x-8 gap-y-2 pb-6 mb-8 border-b border-stone-100">
                  {caddie.age && (
                    <div>
                      <div className="font-body text-[10px] uppercase tracking-wider text-stone-500">Age</div>
                      <div className="font-body text-stone-800">{caddie.age}</div>
                    </div>
                  )}
                  {caddie.sex && (
                    <div>
                      <div className="font-body text-[10px] uppercase tracking-wider text-stone-500">Sex</div>
                      <div className="font-body text-stone-800">{caddie.sex}</div>
                    </div>
                  )}
                  {caddie.phone && (
                    <div>
                      <div className="font-body text-[10px] uppercase tracking-wider text-stone-500">Phone</div>
                      <a href={`tel:${caddie.phone}`} className="font-body text-[#1f3a2e] hover:underline">{caddie.phone}</a>
                    </div>
                  )}
                </div>
              )}

              <div className="space-y-4">
                {METRICS.map((m) => {
                  const v = stats.byMetric[m.key] || 0;
                  return (
                    <div key={m.key}>
                      <div className="flex justify-between items-baseline mb-1.5">
                        <span className="font-body text-stone-800 text-sm">{m.label}</span>
                        <span className="font-display text-lg text-[#1f3a2e]">{stats.count ? fmt1(v) : '—'}</span>
                      </div>
                      <div className="h-2 bg-stone-100 rounded-full overflow-hidden">
                        <div
                          className="h-full bg-gradient-to-r from-[#1f3a2e] to-[#b8935a] transition-all"
                          style={{ width: `${(v / 5) * 100}%` }}
                        />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="bg-white rounded-sm border border-stone-200 p-6 md:p-10">
              <h3 className="font-display text-2xl text-[#1f3a2e] mb-5">Recent Ratings</h3>
              {caddieRatings.length === 0 ? (
                <p className="font-body text-stone-500 text-sm italic">No ratings yet.</p>
              ) : (
                <div className="space-y-3">
                  {caddieRatings.slice(0, 20).map((r) => {
                    const avg = METRICS.reduce((s, m) => s + r[m.key], 0) / METRICS.length;
                    return (
                      <div key={r.id} className="border border-stone-100 rounded-sm p-4 hover:bg-stone-50 transition-colors">
                        <div className="flex justify-between items-start mb-2 flex-wrap gap-2">
                          <div>
                            <div className="font-body text-sm text-stone-800 font-medium">
                              {r.raterName || 'Anonymous'} <span className="text-stone-400 font-normal">·</span> {r.roundType}
                            </div>
                            <div className="font-body text-xs text-stone-500">{r.date}</div>
                          </div>
                          <div className="flex items-center gap-3">
                            <div className="font-display text-xl text-[#b8935a]">{fmt1(avg)}</div>
                            <button
                              onClick={() => { if (confirm('Delete this rating?')) deleteRating(r.id); }}
                              className="text-stone-300 hover:text-rose-600 transition-colors"
                              title="Delete rating"
                            >
                              <Trash2 size={14} />
                            </button>
                          </div>
                        </div>
                        {r.comments && (
                          <p className="font-body text-sm text-stone-600 italic mt-2 pl-3 border-l-2 border-stone-200">
                            "{r.comments}"
                          </p>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        );
      }

      if (tab === 'add') {
        return <AddCaddieForm
          onSave={(data, opts = {}) => {
            addCaddie(data);
            if (!opts.stayOnForm) setTab('overview');
          }}
          onCancel={() => setTab('overview')}
        />;
      }

      if (tab === 'settings') {
        return <SettingsView onBack={() => setTab('overview')} />;
      }

      if (tab === 'import') {
        return <ImportCaddies
          existing={caddies}
          onImport={(rows) => { addCaddiesBulk(rows); setTab('overview'); }}
          onCancel={() => setTab('overview')}
        />;
      }

      const sortedCaddies = [...caddies].sort((a, b) =>
        (statsByCaddie[b.id]?.overall || 0) - (statsByCaddie[a.id]?.overall || 0)
      );

      return (
        <div className="max-w-5xl mx-auto px-4 md:px-6 py-8">
          <div className="flex items-end justify-between mb-8 flex-wrap gap-4">
            <div>
              <div className="font-body text-xs uppercase tracking-wider text-stone-500 mb-1">Administration</div>
              <h1 className="font-display text-4xl text-[#1f3a2e]">Caddie Dashboard</h1>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <button
                onClick={() => setTab('settings')}
                className="text-stone-600 hover:text-[#1f3a2e] border border-stone-300 hover:border-[#1f3a2e] px-4 py-3.5 font-body text-sm uppercase tracking-[0.15em] rounded-sm flex items-center gap-2 transition-colors"
                title="Settings"
              >
                <Settings size={16} /> Settings
              </button>
              <button
                onClick={() => setTab('import')}
                className="text-[#1f3a2e] border border-[#1f3a2e] hover:bg-[#1f3a2e] hover:text-white px-4 py-3.5 font-body text-sm uppercase tracking-[0.15em] rounded-sm flex items-center gap-2 transition-colors"
              >
                <Upload size={16} /> Import
              </button>
              <button
                onClick={() => setTab('add')}
                className="bg-[#b8935a] hover:bg-[#a07c45] text-white px-6 py-3.5 font-body text-sm uppercase tracking-[0.18em] rounded-sm flex items-center gap-2 shadow-md shadow-amber-900/10 transition-all hover:shadow-lg hover:-translate-y-0.5"
              >
                <Plus size={18} strokeWidth={2.5} /> Add Caddie
              </button>
            </div>
          </div>

          <div className="grid grid-cols-3 gap-3 md:gap-5 mb-8">
            <StatCard icon={Users} label="Caddies" value={caddies.length} />
            <StatCard icon={BarChart3} label="Total Ratings" value={totalRatings} />
            <StatCard icon={Award} label="Avg. Overall" value={totalRatings ? fmt1(overallAvg) : '—'} accent />
          </div>

          <div className="bg-white rounded-sm border border-stone-200">
            <div className="px-6 py-4 border-b border-stone-100 flex items-center justify-between flex-wrap gap-3">
              <div>
                <h2 className="font-display text-xl text-[#1f3a2e]">Caddies</h2>
                <span className="font-body text-xs uppercase tracking-wider text-stone-500">
                  {sortedCaddies.length === 0 ? 'None yet' : `${sortedCaddies.length} on record · ranked by overall`}
                </span>
              </div>
              <button
                onClick={() => setTab('add')}
                className="text-[#1f3a2e] hover:text-[#b8935a] font-body text-xs uppercase tracking-[0.15em] flex items-center gap-1.5 px-3 py-2 border border-[#1f3a2e] hover:border-[#b8935a] rounded-sm transition-colors"
              >
                <Plus size={14} /> Add Caddie
              </button>
            </div>
            {sortedCaddies.length === 0 ? (
              <div className="p-12 text-center">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-stone-100 mb-4">
                  <Users size={24} className="text-stone-400" />
                </div>
                <h3 className="font-display text-2xl text-[#1f3a2e] mb-2">No caddies on the roster</h3>
                <p className="font-body text-stone-500 text-sm mb-6">Add your first caddie to start collecting ratings.</p>
                <button
                  onClick={() => setTab('add')}
                  className="bg-[#1f3a2e] hover:bg-[#2a4f3e] text-white px-6 py-3 font-body text-sm uppercase tracking-[0.18em] rounded-sm inline-flex items-center gap-2"
                >
                  <Plus size={16} /> Add First Caddie
                </button>
              </div>
            ) : (
              <ul>
                {sortedCaddies.map((c, idx) => {
                  const s = statsByCaddie[c.id] || { count: 0, overall: 0 };
                  return (
                    <li
                      key={c.id}
                      className="border-b border-stone-100 last:border-b-0 px-6 py-4 hover:bg-stone-50 transition-colors flex items-center justify-between gap-4 cursor-pointer"
                      onClick={() => { setSelectedId(c.id); setTab('caddie'); }}
                    >
                      <div className="flex items-center gap-4 min-w-0">
                        <div className="font-display text-2xl text-stone-300 w-8 flex-shrink-0">
                          {String(idx + 1).padStart(2, '0')}
                        </div>
                        <div className="min-w-0">
                          <div className="font-body font-medium text-stone-800 truncate">
                            {c.bib && <span className="text-stone-400 mr-1">#{c.bib}</span>}
                            {c.name}
                          </div>
                          <div className="font-body text-xs text-stone-500">
                            {s.count} {s.count === 1 ? 'rating' : 'ratings'}
                          </div>
                        </div>
                      </div>
                      <div className="flex items-center gap-4 flex-shrink-0">
                        <div className="text-right">
                          <div className="font-display text-2xl text-[#b8935a] leading-none">
                            {s.count ? fmt1(s.overall) : '—'}
                          </div>
                        </div>
                        <button
                          onClick={(e) => {
                            e.stopPropagation();
                            if (confirm(`Delete ${c.name}? This will also delete all their ratings.`)) deleteCaddie(c.id);
                          }}
                          className="text-stone-300 hover:text-rose-600 transition-colors"
                          title="Delete caddie"
                        >
                          <Trash2 size={15} />
                        </button>
                        <ChevronRight size={16} className="text-stone-300" />
                      </div>
                    </li>
                  );
                })}
              </ul>
            )}
          </div>
        </div>
      );
    }

    function StatCard({ icon: Icon, label, value, accent }) {
      return (
        <div className={`bg-white rounded-sm border border-stone-200 p-4 md:p-5 ${accent ? 'bg-[#1f3a2e] border-[#1f3a2e]' : ''}`}>
          <div className="flex items-center justify-between mb-2">
            <span className={`font-body text-[10px] md:text-xs uppercase tracking-wider ${accent ? 'text-amber-200' : 'text-stone-500'}`}>
              {label}
            </span>
            <Icon size={14} className={accent ? 'text-amber-400' : 'text-stone-400'} />
          </div>
          <div className={`font-display text-3xl md:text-4xl ${accent ? 'text-amber-400' : 'text-[#1f3a2e]'}`}>
            {value}
          </div>
        </div>
      );
    }

    /* ============================================================
       SETTINGS — change password
       ============================================================ */
    function SettingsView({ onBack }) {
      const [cur, setCur] = useState('');
      const [next, setNext] = useState('');
      const [confirm, setConfirm] = useState('');
      const [msg, setMsg] = useState(null);

      const save = () => {
        const stored = loadKey('adminPassword', DEFAULT_PASSWORD);
        if (cur !== stored) return setMsg({ type: 'err', text: 'Current password is incorrect.' });
        if (next.length < 4) return setMsg({ type: 'err', text: 'New password must be at least 4 characters.' });
        if (next !== confirm) return setMsg({ type: 'err', text: 'New passwords do not match.' });
        saveKey('adminPassword', next);
        setCur(''); setNext(''); setConfirm('');
        setMsg({ type: 'ok', text: 'Password updated.' });
        setTimeout(() => setMsg(null), 3500);
      };

      return (
        <div className="max-w-md mx-auto px-4 py-12">
          <button onClick={onBack} className="font-body text-sm text-stone-600 hover:text-[#1f3a2e] flex items-center gap-1 mb-6">
            <ChevronLeft size={16} /> Back to dashboard
          </button>
          <div className="bg-white rounded-sm border border-stone-200 p-8">
            <div className="flex items-center gap-2 mb-1">
              <KeyRound size={20} className="text-[#1f3a2e]" />
              <h2 className="font-display text-3xl text-[#1f3a2e]">Change Password</h2>
            </div>
            <p className="font-body text-sm text-stone-500 mb-6">Applies to this browser's stored admin password.</p>

            {msg && (
              <div className={`mb-5 p-3 rounded-sm flex items-center gap-2 font-body text-sm ${
                msg.type === 'ok'
                  ? 'bg-emerald-50 text-emerald-800 border border-emerald-200'
                  : 'bg-rose-50 text-rose-800 border border-rose-200'
              }`}>
                {msg.type === 'ok' ? <CheckCircle2 size={16} /> : <AlertCircle size={16} />}
                {msg.text}
              </div>
            )}

            <div className="space-y-4">
              <div>
                <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Current Password</label>
                <input type="password" value={cur} onChange={(e) => setCur(e.target.value)}
                  className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e]" />
              </div>
              <div>
                <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">New Password</label>
                <input type="password" value={next} onChange={(e) => setNext(e.target.value)}
                  className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e]" />
              </div>
              <div>
                <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Confirm New Password</label>
                <input type="password" value={confirm} onChange={(e) => setConfirm(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && save()}
                  className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e]" />
              </div>
              <button onClick={save}
                className="w-full py-3 bg-[#1f3a2e] hover:bg-[#2a4f3e] text-white font-body uppercase tracking-[0.2em] text-sm rounded-sm mt-2">
                Update Password
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       IMPORT — bulk caddies from CSV / Excel
       ============================================================ */
    function ImportCaddies({ existing, onImport, onCancel }) {
      const [parsed, setParsed] = useState(null); // { valid: [], skipped: number }
      const [error, setError] = useState(null);
      const [fileName, setFileName] = useState('');

      const pick = (key, row) => {
        // case-insensitive header match across a few aliases
        const aliases = {
          name:  ['name', 'full name', 'fullname', 'caddie', 'caddie name'],
          age:   ['age'],
          sex:   ['sex', 'gender'],
          phone: ['phone', 'phone number', 'mobile', 'contact', 'tel'],
          bib:   ['bib', 'bib number', 'number', 'no'],
        };
        const keys = Object.keys(row);
        for (const a of aliases[key]) {
          const found = keys.find((k) => k.trim().toLowerCase() === a);
          if (found != null && String(row[found]).trim() !== '') return String(row[found]).trim();
        }
        return '';
      };

      const handleFile = async (file) => {
        setError(null); setParsed(null); setFileName(file.name);
        try {
          const buf = await file.arrayBuffer();
          const wb = XLSX.read(buf);
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
          const valid = [];
          let skipped = 0;
          rows.forEach((row) => {
            const name = pick('name', row);
            if (!name) { skipped++; return; }
            const sexRaw = pick('sex', row).toLowerCase();
            const sex = sexRaw.startsWith('m') ? 'Male' : sexRaw.startsWith('f') ? 'Female' : null;
            const ageNum = Number(pick('age', row));
            valid.push({
              id: uid('cd'),
              name,
              age: Number.isFinite(ageNum) && ageNum > 0 ? ageNum : null,
              sex,
              phone: pick('phone', row) || null,
              bib: pick('bib', row) || null,
              createdAt: new Date().toISOString(),
            });
          });
          if (valid.length === 0) {
            setError('No valid rows found. Make sure there is a "name" column with values.');
          } else {
            setParsed({ valid, skipped });
          }
        } catch (e) {
          console.error(e);
          setError('Could not read that file. Use a .csv or .xlsx with a header row.');
        }
      };

      const downloadTemplate = () => {
        const ws = XLSX.utils.aoa_to_sheet([
          ['name', 'age', 'sex', 'phone', 'bib'],
          ['Kwame Mensah', 34, 'Male', '+233200000000', '12'],
          ['Ama Boateng', 29, 'Female', '+233240000000', '7'],
        ]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Caddies');
        XLSX.writeFile(wb, 'caddie_import_template.xlsx');
      };

      return (
        <div className="max-w-xl mx-auto px-4 py-12">
          <button onClick={onCancel} className="font-body text-sm text-stone-600 hover:text-[#1f3a2e] flex items-center gap-1 mb-6">
            <ChevronLeft size={16} /> Back to dashboard
          </button>
          <div className="bg-white rounded-sm border border-stone-200 p-8">
            <div className="flex items-center gap-2 mb-1">
              <FileSpreadsheet size={20} className="text-[#1f3a2e]" />
              <h2 className="font-display text-3xl text-[#1f3a2e]">Bulk Import Caddies</h2>
            </div>
            <p className="font-body text-sm text-stone-500 mb-6">
              Upload a <strong>.csv</strong> or <strong>.xlsx</strong> with a header row. Recognised columns: name, age, sex, phone, bib. Only <strong>name</strong> is required.
            </p>

            <button
              onClick={downloadTemplate}
              className="mb-5 text-[#1f3a2e] hover:text-[#b8935a] font-body text-sm flex items-center gap-1.5 transition-colors"
            >
              <Download size={15} /> Download a template
            </button>

            <label className="block border-2 border-dashed border-stone-300 hover:border-[#1f3a2e] rounded-sm p-8 text-center cursor-pointer transition-colors">
              <Upload size={26} className="mx-auto text-stone-400 mb-2" />
              <span className="font-body text-sm text-stone-600 block">
                {fileName || 'Click to choose a CSV or Excel file'}
              </span>
              <input
                type="file"
                accept=".csv,.xlsx,.xls"
                className="hidden"
                onChange={(e) => e.target.files[0] && handleFile(e.target.files[0])}
              />
            </label>

            {error && (
              <div className="mt-4 p-3 rounded-sm bg-rose-50 border border-rose-200 flex items-center gap-2 font-body text-sm text-rose-800">
                <AlertCircle size={16} /> {error}
              </div>
            )}

            {parsed && (
              <div className="mt-5">
                <div className="p-3 rounded-sm bg-emerald-50 border border-emerald-200 font-body text-sm text-emerald-800 mb-4 flex items-center gap-2">
                  <CheckCircle2 size={16} />
                  {parsed.valid.length} caddie{parsed.valid.length === 1 ? '' : 's'} ready to import
                  {parsed.skipped > 0 && ` · ${parsed.skipped} row${parsed.skipped === 1 ? '' : 's'} skipped (no name)`}
                </div>
                <div className="max-h-56 overflow-y-auto border border-stone-100 rounded-sm mb-4">
                  {parsed.valid.slice(0, 100).map((c) => (
                    <div key={c.id} className="px-4 py-2 border-b border-stone-100 last:border-b-0 font-body text-sm flex justify-between gap-3">
                      <span className="text-stone-800">{c.bib ? `#${c.bib} · ` : ''}{c.name}</span>
                      <span className="text-stone-400 text-xs">
                        {[c.age, c.sex, c.phone].filter(Boolean).join(' · ') || '—'}
                      </span>
                    </div>
                  ))}
                </div>
                <button
                  onClick={() => onImport(parsed.valid)}
                  className="w-full py-3 bg-[#1f3a2e] hover:bg-[#2a4f3e] text-white font-body uppercase tracking-[0.2em] text-sm rounded-sm"
                >
                  Import {parsed.valid.length} Caddie{parsed.valid.length === 1 ? '' : 's'}
                </button>
                <p className="font-body text-xs text-stone-400 mt-2 text-center">
                  Adds to the existing {existing.length} on record. Duplicates are not removed.
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    function AddCaddieForm({ onSave, onCancel }) {
      const empty = { name: '', age: '', sex: '', phone: '', bib: '' };
      const [form, setForm] = useState(empty);
      const [justAdded, setJustAdded] = useState(null);
      const update = (k, v) => setForm({ ...form, [k]: v });
      const canSave = form.name.trim().length > 0;

      const buildCaddie = () => ({
        id: uid('cd'),
        name: form.name.trim(),
        age: form.age ? Number(form.age) : null,
        sex: form.sex || null,
        phone: form.phone.trim() || null,
        bib: form.bib.trim() || null,
        createdAt: new Date().toISOString(),
      });

      const saveAndClose = () => { onSave(buildCaddie()); };
      const saveAndAddAnother = () => {
        const c = buildCaddie();
        onSave(c, { stayOnForm: true });
        setJustAdded(c.name);
        setForm(empty);
        setTimeout(() => setJustAdded(null), 3500);
      };

      return (
        <div className="max-w-md mx-auto px-4 py-12">
          <button onClick={onCancel} className="font-body text-sm text-stone-600 hover:text-[#1f3a2e] flex items-center gap-1 mb-6">
            <ChevronLeft size={16} /> Back to dashboard
          </button>
          <div className="bg-white rounded-sm border border-stone-200 p-8">
            <h2 className="font-display text-3xl text-[#1f3a2e] mb-1">Add Caddie</h2>
            <p className="font-body text-sm text-stone-500 mb-6">Adding multiple caddies? Use <em>Save & Add Another</em>.</p>

            {justAdded && (
              <div className="mb-5 p-3 rounded-sm bg-emerald-50 border border-emerald-200 flex items-center gap-2 font-body text-sm text-emerald-800">
                <CheckCircle2 size={16} /> {justAdded} added. Enter the next caddie below.
              </div>
            )}

            <div className="space-y-4">
              <div>
                <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Full Name</label>
                <input
                  type="text"
                  value={form.name}
                  autoFocus
                  onChange={(e) => update('name', e.target.value)}
                  className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e]"
                />
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Age</label>
                  <input
                    type="number"
                    min="14"
                    max="100"
                    value={form.age}
                    onChange={(e) => update('age', e.target.value)}
                    className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e]"
                  />
                </div>
                <div>
                  <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Sex</label>
                  <select
                    value={form.sex}
                    onChange={(e) => update('sex', e.target.value)}
                    className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm bg-white focus:outline-none focus:border-[#1f3a2e]"
                  >
                    <option value="">—</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                  </select>
                </div>
              </div>

              <div>
                <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Phone Number</label>
                <input
                  type="tel"
                  value={form.phone}
                  onChange={(e) => update('phone', e.target.value)}
                  placeholder="+233…"
                  className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e]"
                />
              </div>

              <div>
                <label className="font-body text-xs uppercase tracking-wider text-stone-500 block mb-2">Bib Number <span className="text-stone-400 normal-case italic">(optional)</span></label>
                <input
                  type="text"
                  value={form.bib}
                  onChange={(e) => update('bib', e.target.value)}
                  className="font-body w-full px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-[#1f3a2e]"
                />
              </div>

              <div className="flex flex-col gap-2 mt-2">
                <button
                  disabled={!canSave}
                  onClick={saveAndClose}
                  className="w-full py-3 bg-[#1f3a2e] hover:bg-[#2a4f3e] disabled:bg-stone-300 text-white font-body uppercase tracking-[0.2em] text-sm rounded-sm"
                >
                  Save Caddie
                </button>
                <button
                  disabled={!canSave}
                  onClick={saveAndAddAnother}
                  className="w-full py-3 bg-white border border-[#1f3a2e] text-[#1f3a2e] hover:bg-stone-50 disabled:border-stone-300 disabled:text-stone-300 disabled:cursor-not-allowed font-body uppercase tracking-[0.2em] text-sm rounded-sm flex items-center justify-center gap-2"
                >
                  <Plus size={14} /> Save & Add Another
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       APP ROOT
       ============================================================ */
    function App() {
      const [view, setView] = useState('rate');
      const [adminUnlocked, setAdminUnlocked] = useState(false);
      const [showPin, setShowPin] = useState(false);

      const [caddies, setCaddies] = useState(() => loadKey('caddies', []));
      const [ratings, setRatings] = useState(() => loadKey('ratings', []));

      const addCaddie = (caddie) => {
        const next = [...caddies, caddie];
        setCaddies(next);
        saveKey('caddies', next);
      };
      const addCaddiesBulk = (newCaddies) => {
        const next = [...caddies, ...newCaddies];
        setCaddies(next);
        saveKey('caddies', next);
      };
      const deleteCaddie = (id) => {
        const nextC = caddies.filter((c) => c.id !== id);
        const nextR = ratings.filter((r) => r.caddieId !== id);
        setCaddies(nextC); setRatings(nextR);
        saveKey('caddies', nextC); saveKey('ratings', nextR);
      };
      const addRating = (rating) => {
        const next = [...ratings, rating];
        setRatings(next);
        saveKey('ratings', next);
      };
      const deleteRating = (id) => {
        const next = ratings.filter((r) => r.id !== id);
        setRatings(next);
        saveKey('ratings', next);
      };

      const goAdmin = () => { adminUnlocked ? setView('admin') : setShowPin(true); };

      return (
        <div className="min-h-screen bg-[#f7f4ec] font-body crest-bg">
          <nav className="bg-white/80 backdrop-blur border-b border-stone-200">
            <div className="max-w-5xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 rounded-full bg-[#1f3a2e] flex items-center justify-center">
                  <Flag className="text-amber-400" size={14} strokeWidth={2} />
                </div>
                <span className="font-display text-xl text-[#1f3a2e]">Caddie Ratings</span>
              </div>
              <div className="flex items-center gap-1">
                <NavBtn active={view === 'rate'} onClick={() => setView('rate')}>Rate</NavBtn>
                <NavBtn active={view === 'admin'} onClick={goAdmin}>
                  <Lock size={12} className="inline mr-1 -mt-0.5" />Admin
                </NavBtn>
              </div>
            </div>
          </nav>

          {view === 'rate' ? (
            <RaterView caddies={caddies} addRating={addRating} />
          ) : (
            <AdminView
              caddies={caddies}
              ratings={ratings}
              addCaddie={addCaddie}
              addCaddiesBulk={addCaddiesBulk}
              deleteCaddie={deleteCaddie}
              deleteRating={deleteRating}
            />
          )}

          {showPin && (
            <PasswordGate
              onUnlock={() => { setAdminUnlocked(true); setShowPin(false); setView('admin'); }}
              onCancel={() => setShowPin(false)}
            />
          )}

          <footer className="text-center py-8 font-body text-xs uppercase tracking-[0.2em] text-stone-400">
            Excellence on the course
          </footer>
        </div>
      );
    }

    function NavBtn({ active, onClick, children }) {
      return (
        <button
          onClick={onClick}
          className={`px-4 py-2 font-body text-xs uppercase tracking-[0.15em] rounded-sm transition-colors ${
            active ? 'bg-[#1f3a2e] text-white' : 'text-stone-600 hover:text-[#1f3a2e]'
          }`}
        >
          {children}
        </button>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
