<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TVET Scorecard — Submissions Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --crimson:#8B1A2B; --gold:#C17F24; --teal:#2E6B5E; --navy:#1E4060;
    --ink:#1a1a2e; --parchment:#f8f5f0; --card:#fff;
    --border:#e5e7eb; --muted:#64748b; --light:#f1f5f9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Source Sans 3',sans-serif;background:var(--parchment);color:#1a1a1a;min-height:100vh;}

  /* NAV TABS */
  .topbar{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:0 2rem;display:flex;align-items:stretch;gap:0;}
  .topbar-brand{font-family:'Playfair Display',serif;color:white;font-size:1rem;padding:1rem 1.5rem 1rem 0;border-right:1px solid rgba(255,255,255,0.1);margin-right:1rem;white-space:nowrap;display:flex;align-items:center;gap:0.5rem;}
  .topbar-brand span{color:var(--gold);}
  .tab{padding:0.9rem 1.2rem;color:#94a3b8;font-size:0.8rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;}
  .tab:hover{color:white;}
  .tab.active{color:white;border-bottom-color:var(--gold);}

  /* LAYOUT */
  .main{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem;}

  /* CARDS */
  .panel{background:white;border-radius:12px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,0.06);padding:1.25rem;}
  .panel-label{font-size:0.6rem;color:#94a3b8;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.9rem;}
  .panel-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600;color:#1a1a1a;margin-bottom:0.9rem;}

  /* STAT TILES */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.25rem;}
  @media(max-width:640px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
  .stat-tile{background:white;border-radius:12px;border:1px solid var(--border);padding:1rem 1.25rem;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .stat-val{font-family:'Playfair Display',serif;font-size:2rem;font-weight:600;line-height:1;}
  .stat-lbl{font-size:0.68rem;color:var(--muted);margin-top:0.25rem;}

  /* AVERAGE BARS */
  .avg-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem;}
  @media(max-width:640px){.avg-grid{grid-template-columns:1fr;}}
  .avg-row{display:flex;align-items:center;gap:10px;margin-bottom:0.5rem;}
  .avg-lbl{font-size:0.68rem;color:#374151;width:110px;flex-shrink:0;line-height:1.3;}
  .avg-track{flex:1;height:10px;background:var(--light);border-radius:5px;overflow:hidden;}
  .avg-fill{height:100%;border-radius:5px;transition:width 0.5s ease;}
  .avg-score{font-size:0.72rem;font-weight:700;width:28px;text-align:right;}

  /* RADAR */
  .radar-section{display:grid;grid-template-columns:260px 1fr;gap:1rem;align-items:start;margin-bottom:1.25rem;}
  @media(max-width:640px){.radar-section{grid-template-columns:1fr;}}

  /* TABLE */
  .submissions-table{width:100%;border-collapse:collapse;font-size:0.75rem;}
  .submissions-table th{background:#f8fafc;border-bottom:2px solid var(--border);padding:0.6rem 0.75rem;text-align:left;font-weight:700;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
  .submissions-table td{padding:0.6rem 0.75rem;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
  .submissions-table tr:last-child td{border-bottom:none;}
  .submissions-table tr:hover td{background:#fafbfc;}
  .score-chip{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;color:white;font-weight:700;font-size:0.72rem;}
  .del-btn{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:1rem;transition:color 0.15s;padding:0 4px;}
  .del-btn:hover{color:var(--crimson);}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
  .empty-icon{font-size:2.5rem;margin-bottom:0.75rem;}

  /* SUBMIT FORM */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:1.25rem;}
  .form-group{display:flex;flex-direction:column;gap:0.35rem;}
  .form-label{font-size:0.68rem;font-weight:700;color:#374151;}
  .form-input{padding:0.55rem 0.75rem;border:1px solid var(--border);border-radius:8px;font-family:'Source Sans 3',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.2s;}
  .form-input:focus{border-color:var(--gold);}

  .domain-score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-bottom:1.25rem;}
  .domain-scorer{background:var(--light);border-radius:10px;padding:0.85rem 1rem;}
  .ds-head{margin-bottom:0.5rem;}
  .ds-cat{font-size:0.55rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;}
  .ds-name{font-size:0.85rem;font-weight:600;color:#1a1a1a;}
  .ds-btns{display:flex;gap:4px;}
  .ds-btn{flex:1;height:28px;border:none;border-radius:5px;cursor:pointer;font-weight:700;font-size:0.78rem;font-family:'Source Sans 3',sans-serif;background:white;transition:all 0.15s;}
  .ds-btn:hover{transform:scale(1.08);}
  .ds-btn.active{color:white;}

  .btn{padding:0.6rem 1.3rem;border-radius:8px;font-family:'Source Sans 3',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem;}
  .btn-primary{background:var(--crimson);color:white;}
  .btn-primary:hover{background:#6e1421;transform:translateY(-1px);box-shadow:0 4px 14px rgba(139,26,43,0.25);}
  .btn-primary:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-secondary:hover{border-color:var(--crimson);color:var(--crimson);}

  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a2e;color:white;padding:0.75rem 1.25rem;border-radius:10px;font-size:0.8rem;font-weight:600;opacity:0;transform:translateY(8px);transition:all 0.3s;pointer-events:none;z-index:999;border-left:3px solid var(--gold);}
  .toast.show{opacity:1;transform:translateY(0);}

  /* level pill */
  .level-pill{display:inline-block;padding:0.2rem 0.55rem;border-radius:99px;font-size:0.63rem;font-weight:700;color:white;}

  /* view toggle */
  #view-dashboard{display:block;}
  #view-submit{display:none;}
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topbar">
  <div class="topbar-brand">TVET <span>Scorecard</span></div>
  <div class="tab active" onclick="switchTab('dashboard',this)">📊 Dashboard</div>
  <div class="tab" onclick="switchTab('submit',this)">➕ New Submission</div>
</div>

<!-- ═══════════════════════════════════════════
     DASHBOARD VIEW
═══════════════════════════════════════════ -->
<div id="view-dashboard">
<div class="main">

  <!-- Stat tiles -->
  <div class="stat-grid" id="statGrid"></div>

  <!-- Radar + Avg bars -->
  <div class="radar-section">
    <div class="panel">
      <div class="panel-label">Average Profile</div>
      <svg id="radar" viewBox="0 0 260 260" width="220" height="220" style="display:block;margin:0 auto;"></svg>
    </div>
    <div class="panel">
      <div class="panel-label">Average Score per Domain</div>
      <div id="avgBars"></div>
    </div>
  </div>

  <!-- Submissions table -->
  <div class="panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.75rem;">
      <div class="panel-title" style="margin:0;">All Submissions</div>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <input id="searchBox" class="form-input" style="width:180px;padding:0.4rem 0.7rem;" placeholder="Search name / org…" oninput="renderTable()" />
        <button class="btn btn-secondary" style="padding:0.4rem 0.9rem;" onclick="exportCSV()">⬇ CSV</button>
        <button class="btn btn-secondary" style="padding:0.4rem 0.9rem;" onclick="window.print()">🖨 Print</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table class="submissions-table" id="submissionsTable"></table>
    </div>
  </div>

</div>
</div>

<!-- ═══════════════════════════════════════════
     SUBMIT VIEW
═══════════════════════════════════════════ -->
<div id="view-submit">
<div class="main">
  <div class="panel" style="max-width:820px;">
    <div class="panel-title">New Scorecard Submission</div>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Assessor Name *</label>
        <input class="form-input" id="f-name" placeholder="Full name" />
      </div>
      <div class="form-group">
        <label class="form-label">Organisation</label>
        <input class="form-input" id="f-org" placeholder="Institution / organisation" />
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="f-date" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <input class="form-input" id="f-notes" placeholder="Optional notes" />
      </div>
    </div>

    <div class="panel-label">Rate Each Domain (1–5)</div>
    <div class="domain-score-grid" id="domainScorers"></div>

    <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="submitBtn" onclick="submitForm()">Submit Scorecard</button>
      <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
      <span id="formErr" style="color:var(--crimson);font-size:0.75rem;"></span>
    </div>
  </div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DOMAINS = [
  {id:"market_assessment",       label:"Market Assessment",       short:"Market",       color:"#8B1A2B", category:"Strategic & Operational Planning"},
  {id:"curriculum_design",       label:"Curriculum Design",       short:"Curr. Design", color:"#C17F24", category:"Curriculum & Training"},
  {id:"curriculum_delivery",     label:"Curriculum Delivery",     short:"Delivery",     color:"#C17F24", category:"Curriculum & Training"},
  {id:"work_based_learning",     label:"Work-Based Learning",     short:"WBL",          color:"#C17F24", category:"Curriculum & Training"},
  {id:"management",              label:"Management",              short:"Management",   color:"#2E6B5E", category:"Stakeholder Management"},
  {id:"monitoring_evaluation",   label:"Monitoring & Evaluation", short:"M&E",          color:"#2E6B5E", category:"Stakeholder Management"},
  {id:"financial_sustainability",label:"Financial Sustainability",short:"Finance",      color:"#1E4060", category:"Institutional Capacity"},
  {id:"governance",              label:"Governance",              short:"Governance",   color:"#1E4060", category:"Institutional Capacity"},
];

const LEVELS = [
  {v:1,label:"Supply-Oriented",  color:"#c0392b"},
  {v:2,label:"Demand-Responsive",color:"#d35400"},
  {v:3,label:"TVET-Led",         color:"#C17F24"},
  {v:4,label:"Employer-Engaged", color:"#2E6B5E"},
  {v:5,label:"Systems-Embedded", color:"#1E4060"},
];

function getLevel(avg){return LEVELS.slice().reverse().find(l=>avg>=l.v)||LEVELS[0];}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function load(){try{return JSON.parse(localStorage.getItem('tvet_submissions')||'[]');}catch{return[];}}
function save(d){localStorage.setItem('tvet_submissions',JSON.stringify(d));}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(view, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-dashboard').style.display = view==='dashboard'?'block':'none';
  document.getElementById('view-submit').style.display    = view==='submit'?'block':'none';
  if(view==='dashboard') renderAll();
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function renderAll(){
  const data = load();
  renderStats(data);
  renderAvgBars(data);
  drawRadar(data);
  renderTable();
}

function renderStats(data){
  const n = data.length;
  const allAvgs = data.map(s=>{
    const vals = DOMAINS.map(d=>s.scores[d.id]||0);
    return vals.reduce((a,b)=>a+b,0)/vals.filter(v=>v>0).length||0;
  });
  const grandAvg = n>0?(allAvgs.reduce((a,b)=>a+b,0)/n).toFixed(1):0;
  const top = n>0?[...data].sort((a,b)=>avg(b)-avg(a))[0]:null;
  const recent = n>0?data[data.length-1].date:'—';

  const lbl = n>0?getLevel(parseFloat(grandAvg)):null;

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-tile">
      <div class="stat-val" style="color:var(--navy)">${n}</div>
      <div class="stat-lbl">Total Submissions</div>
    </div>
    <div class="stat-tile">
      <div class="stat-val" style="color:${lbl?lbl.color:'#94a3b8'}">${n>0?grandAvg:'—'}</div>
      <div class="stat-lbl">Average Score /5${lbl?` · <b style="color:${lbl.color}">${lbl.label}</b>`:''}</div>
    </div>
    <div class="stat-tile">
      <div class="stat-val" style="color:var(--gold);font-size:1.1rem;padding-top:0.3rem;">${top?top.name:'—'}</div>
      <div class="stat-lbl">Highest Scorer${top?' ('+avg(top).toFixed(1)+')':''}</div>
    </div>
    <div class="stat-tile">
      <div class="stat-val" style="color:var(--teal);font-size:1.1rem;padding-top:0.3rem;">${recent}</div>
      <div class="stat-lbl">Most Recent</div>
    </div>
  `;
}

function avg(s){
  const vals = DOMAINS.map(d=>s.scores[d.id]||0).filter(v=>v>0);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
}

function domainAvg(data, id){
  const vals = data.map(s=>s.scores[id]).filter(v=>v>0);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
}

function renderAvgBars(data){
  const el = document.getElementById('avgBars');
  el.innerHTML = '';
  DOMAINS.forEach(d=>{
    const a = domainAvg(data, d.id);
    const row = document.createElement('div');
    row.className = 'avg-row';
    row.innerHTML = `
      <div class="avg-lbl">${d.label}</div>
      <div class="avg-track"><div class="avg-fill" style="width:${(a/5)*100}%;background:${a>0?d.color:'#e5e7eb'}"></div></div>
      <div class="avg-score" style="color:${a>0?d.color:'#cbd5e1'}">${a>0?a.toFixed(1):'—'}</div>
    `;
    el.appendChild(row);
  });
}

function drawRadar(data){
  const svg = document.getElementById('radar');
  const cx=130,cy=130,r=88,n=DOMAINS.length;
  const pt=(i,val)=>{
    const a=(Math.PI*2*i/n)-Math.PI/2;
    return{x:cx+(val/5)*r*Math.cos(a),y:cy+(val/5)*r*Math.sin(a)};
  };
  let html='';
  [1,2,3,4,5].forEach(lvl=>{
    const pts=DOMAINS.map((_,i)=>pt(i,lvl));
    html+=`<path d="${pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')} Z" fill="none" stroke="#e2e8f0" stroke-width="${lvl===5?1.5:0.7}"/>`;
  });
  DOMAINS.forEach((_,i)=>{const p=pt(i,5);html+=`<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="#d1d5db" stroke-width="0.7"/>`;});

  // avg polygon
  const avgs=DOMAINS.map(d=>domainAvg(data,d.id));
  const spts=avgs.map((a,i)=>pt(i,a));
  html+=`<path d="${spts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')} Z" fill="rgba(139,26,43,0.12)" stroke="#8B1A2B" stroke-width="2"/>`;
  avgs.forEach((a,i)=>{if(a===0)return;const p=pt(i,a);html+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5" fill="${DOMAINS[i].color}" stroke="white" stroke-width="1.5"/>`;});

  // individual lines (faint)
  if(data.length>0 && data.length<=10){
    data.forEach(s=>{
      const spts2=DOMAINS.map((d,i)=>pt(i,s.scores[d.id]||0));
      html+=`<path d="${spts2.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')} Z" fill="none" stroke="rgba(100,100,100,0.12)" stroke-width="1"/>`;
    });
  }

  DOMAINS.forEach((d,i)=>{
    const a=(Math.PI*2*i/n)-Math.PI/2;
    const lx=(cx+(r+24)*Math.cos(a)).toFixed(1);
    const ly=(cy+(r+24)*Math.sin(a)).toFixed(1);
    html+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="8.5" font-family="Georgia,serif" fill="#374151" font-weight="600">${d.short}</text>`;
  });
  svg.innerHTML=html;
}

function renderTable(){
  const data=load();
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const filtered=data.filter(s=>
    s.name.toLowerCase().includes(q)||
    (s.org||'').toLowerCase().includes(q)
  );

  const table=document.getElementById('submissionsTable');
  if(filtered.length===0){
    table.innerHTML=`<tr><td colspan="${4+DOMAINS.length}" style="padding:2.5rem;text-align:center;color:var(--muted);">
      <div style="font-size:2rem;margin-bottom:0.5rem;">📋</div>
      ${data.length===0?'No submissions yet. <a href="#" onclick="switchTab(\'submit\',document.querySelectorAll(\'.tab\')[1]);return false;" style="color:var(--crimson)">Add the first one →</a>':'No results match your search.'}
    </td></tr>`;
    return;
  }

  const th=(t,extra='')=>`<th ${extra}>${t}</th>`;
  table.innerHTML=`<thead><tr>
    ${th('Assessor')}${th('Organisation')}${th('Date')}
    ${DOMAINS.map(d=>`<th style="color:${d.color}">${d.short}</th>`).join('')}
    ${th('Avg')}${th('Level')}${th('')}
  </tr></thead>
  <tbody>
    ${filtered.slice().reverse().map((s,ri)=>{
      const a=avg(s);
      const lbl=getLevel(a);
      return `<tr>
        <td style="font-weight:600">${s.name}</td>
        <td style="color:var(--muted)">${s.org||'—'}</td>
        <td style="color:var(--muted);white-space:nowrap">${s.date}</td>
        ${DOMAINS.map(d=>{
          const v=s.scores[d.id]||0;
          return `<td><span class="score-chip" style="background:${v?d.color:'#e5e7eb'};color:${v?'white':'#94a3b8'}">${v||'—'}</span></td>`;
        }).join('')}
        <td style="font-weight:700;color:${lbl.color}">${a.toFixed(1)}</td>
        <td><span class="level-pill" style="background:${lbl.color}">${lbl.label}</span></td>
        <td><button class="del-btn" title="Delete" onclick="deleteEntry(${data.length-1-ri+filtered.length-filtered.length+ data.indexOf(s)})">✕</button></td>
      </tr>`;
    }).join('')}
  </tbody>`;
}

function deleteEntry(idx){
  if(!confirm('Delete this submission?'))return;
  const data=load();
  data.splice(idx,1);
  save(data);
  renderAll();
  toast('Submission deleted');
}

// ─── CSV EXPORT ───────────────────────────────────────────────────────────────
function exportCSV(){
  const data=load();
  if(!data.length){toast('No data to export');return;}
  const headers=['Name','Organisation','Date',...DOMAINS.map(d=>d.label),'Average','Level','Notes'];
  const rows=data.map(s=>{
    const a=avg(s);
    return [s.name,s.org||'',s.date,...DOMAINS.map(d=>s.scores[d.id]||''),a.toFixed(2),getLevel(a).label,s.notes||''];
  });
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='tvet_submissions.csv';
  a.click();
  toast('CSV downloaded');
}

// ─── SUBMIT FORM ──────────────────────────────────────────────────────────────
let formScores={};

function buildForm(){
  // Set today's date
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];

  const grid=document.getElementById('domainScorers');
  grid.innerHTML='';
  DOMAINS.forEach(d=>{
    const div=document.createElement('div');
    div.className='domain-scorer';
    div.innerHTML=`
      <div class="ds-head">
        <div class="ds-cat" style="color:${d.color}">${d.category}</div>
        <div class="ds-name">${d.label}</div>
      </div>
      <div class="ds-btns" id="dsbtns-${d.id}">
        ${[1,2,3,4,5].map(v=>`
          <button class="ds-btn" id="dsbtn-${d.id}-${v}" style="color:${d.color}"
            onclick="pickScore('${d.id}',${v},'${d.color}')">${v}</button>
        `).join('')}
      </div>
    `;
    grid.appendChild(div);
  });
}

function pickScore(id,val,color){
  formScores[id]=val;
  [1,2,3,4,5].forEach(v=>{
    const btn=document.getElementById(`dsbtn-${id}-${v}`);
    if(v===val){btn.classList.add('active');btn.style.background=color;btn.style.color='white';}
    else if(v<val){btn.classList.remove('active');btn.style.background=color+'28';btn.style.color=color;}
    else{btn.classList.remove('active');btn.style.background='white';btn.style.color=color;}
  });
  document.getElementById('formErr').textContent='';
}

function submitForm(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('formErr').textContent='Assessor name is required.';return;}
  const rated=Object.keys(formScores).length;
  if(rated<DOMAINS.length){document.getElementById('formErr').textContent=`Please rate all 8 domains (${rated}/8 done).`;return;}

  const entry={
    id:Date.now(),
    name,
    org:document.getElementById('f-org').value.trim(),
    date:document.getElementById('f-date').value||new Date().toISOString().split('T')[0],
    notes:document.getElementById('f-notes').value.trim(),
    scores:{...formScores},
  };

  const data=load();
  data.push(entry);
  save(data);

  clearForm();
  toast('✓ Submission saved!');
  setTimeout(()=>switchTab('dashboard',document.querySelectorAll('.tab')[0]),700);
}

function clearForm(){
  document.getElementById('f-name').value='';
  document.getElementById('f-org').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('formErr').textContent='';
  formScores={};
  buildForm();
}

// ─── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderAll();
buildForm();
</script>
</body>
</html>
