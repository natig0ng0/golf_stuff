<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="./config.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0f1e;color:#e8eaf0;min-height:100vh}
input,select,textarea{background:#1a2236;border:1px solid #233050;color:#e8eaf0;border-radius:8px;padding:10px 14px;font-size:14px;width:100%;outline:none;transition:border .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#00b8a9}
button{cursor:pointer;font-family:inherit;transition:all .15s}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;border:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#00b8a9;color:#0a0f1e}.btn-primary:hover:not(:disabled){background:#00d4c4}
.btn-outline{background:transparent;border:1px solid #233050;color:#e8eaf0}.btn-outline:hover:not(:disabled){border-color:#00b8a9;color:#00b8a9}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover:not(:disabled){background:#dc2626}
.btn-gold{background:#f0a500;color:#0a0f1e}.btn-gold:hover:not(:disabled){background:#f5b830}
.btn-sm{padding:6px 12px;font-size:13px}.btn-xs{padding:4px 10px;font-size:12px;border-radius:6px}
.card{background:#111827;border:1px solid #233050;border-radius:12px;padding:24px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-success{background:#052e16;color:#4ade80;border:1px solid #166534}
.badge-warn{background:#2d1d0a;color:#fbbf24;border:1px solid #92400e}
.badge-gray{background:#1e293b;color:#94a3b8;border:1px solid #334155}
.badge-info{background:#0c1a2e;color:#60a5fa;border:1px solid #1e3a5f}
.tab-bar{display:flex;gap:4px;background:#111827;padding:4px;border-radius:10px;margin-bottom:24px}
.tab{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;border:none;background:transparent;color:#94a3b8;cursor:pointer;transition:all .15s}
.tab.active{background:#1a2236;color:#00b8a9}
label{font-size:13px;color:#94a3b8;display:block;margin-bottom:6px}
.form-row{margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}}
.scroll{max-height:440px;overflow-y:auto;padding-right:4px}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-track{background:#111827}
.scroll::-webkit-scrollbar-thumb{background:#233050;border-radius:4px}
.spinner{width:20px;height:20px;border:2px solid #233050;border-top-color:#00b8a9;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-err{background:#2a0a0a;border:1px solid #7f1d1d;color:#fca5a5}
.alert-ok{background:#0d3026;border:1px solid #166534;color:#4ade80}
.alert-info{background:#0c1a2e;border:1px solid #1e3a5f;color:#93c5fd}
.mono{font-family:'Courier New',monospace;letter-spacing:2px}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ═══ FIREBASE LAYER ═══ */
let db = null;
function initFirebase(cfg) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.firestore();
    return true;
  } catch(e) { console.error(e); return false; }
}
const FS = {
  async getDoc(col,id){ const d=await db.collection(col).doc(id).get(); return d.exists?{id:d.id,...d.data()}:null; },
  async setDoc(col,id,data){ return db.collection(col).doc(id).set(data,{merge:true}); },
  onDoc(col,id,cb){ return db.collection(col).doc(id).onSnapshot(s=>cb(s.exists?{id:s.id,...s.data()}:null)); },
  onCol(col,cb){ return db.collection(col).onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); },
  async addDoc(col,data){ return db.collection(col).add(data); },
  async updateDoc(col,id,data){ return db.collection(col).doc(id).update(data); },
  async deleteDoc(col,id){ return db.collection(col).doc(id).delete(); },
  async batchVotes(voteDocs,voterId){
    const batch=db.batch();
    voteDocs.forEach(v=>batch.set(db.collection('votes').doc(),v));
    batch.update(db.collection('voters').doc(voterId),{hasVoted:true});
    return batch.commit();
  },
  async clearVotes(){
    const snap=await db.collection('votes').get();
    const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    return batch.commit();
  },
  async resetVoterStatus(){
    const snap=await db.collection('voters').get();
    const batch=db.batch();
    snap.docs.forEach(d=>batch.update(d.ref,{hasVoted:false}));
    return batch.commit();
  }
};

/* ═══ EMAIL HELPER ═══ */
async function sendVoterEmail(voter, config) {
  const { emailjsServiceId, emailjsTemplateId, emailjsPublicKey, appUrl, electionTitle } = config;
  if(!emailjsServiceId || !emailjsTemplateId || !emailjsPublicKey) throw new Error('EmailJS not configured. Go to Setup → Email Settings.');
  if(!voter.email) throw new Error('This voter has no email address.');
  await emailjs.send(emailjsServiceId, emailjsTemplateId, {
    to_name:        voter.name,
    to_email:       voter.email,
    voter_code:     voter.code,
    election_title: electionTitle || '2026 Elections',
    app_url:        appUrl || (window.location.origin + window.location.pathname),
  }, emailjsPublicKey);
}

/* ═══ DEFAULTS ═══ */
const DEFAULT_POSITIONS = [
  {id:'p1',name:'President',           candidates:[{id:'c1a',name:'Candidate A'},{id:'c1b',name:'Candidate B'},{id:'c1c',name:'Candidate C'}]},
  {id:'p2',name:'Vice President',      candidates:[{id:'c2a',name:'Candidate A'},{id:'c2b',name:'Candidate B'},{id:'c2c',name:'Candidate C'}]},
  {id:'p3',name:'Secretary',           candidates:[{id:'c3a',name:'Candidate A'},{id:'c3b',name:'Candidate B'},{id:'c3c',name:'Candidate C'}]},
  {id:'p4',name:'Treasurer',           candidates:[{id:'c4a',name:'Candidate A'},{id:'c4b',name:'Candidate B'},{id:'c4c',name:'Candidate C'}]},
  {id:'p5',name:'PRO / Communications',candidates:[{id:'c5a',name:'Candidate A'},{id:'c5b',name:'Candidate B'},{id:'c5c',name:'Candidate C'}]},
  {id:'p6',name:'Social Media Officer',candidates:[{id:'c6a',name:'Candidate A'},{id:'c6b',name:'Candidate B'},{id:'c6c',name:'Candidate C'}]},
];
const DEFAULT_CONFIG = {electionTitle:'2026 Elections',isOpen:false};

function genCode(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }

/* ═══ HOME SCREEN ═══
   Admin access: click the copyright line at the bottom 5 times quickly,
   or navigate to ?admin in the URL.
════════════════════ */
function HomeScreen({onAdmin,onVoter,electionTitle,isOpen}) {
  const [tapCount,setTapCount]=useState(0);
  const tapTimer=useRef(null);

  function handleSecretTap(){
    const next=tapCount+1;
    setTapCount(next);
    clearTimeout(tapTimer.current);
    if(next>=5){ setTapCount(0); onAdmin(); return; }
    tapTimer.current=setTimeout(()=>setTapCount(0),2000);
  }

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',maxWidth:480,width:'100%'}}>
        <div style={{marginBottom:8,fontSize:12,letterSpacing:'2px',color:'#00b8a9',fontWeight:600,textTransform:'uppercase'}}>Secure Voting System</div>
        <h1 style={{fontSize:'clamp(26px,5vw,42px)',fontWeight:700,color:'#fff',marginBottom:8,lineHeight:1.2}}>{electionTitle}</h1>
        <p style={{color:'#64748b',marginBottom:12,fontSize:15}}>Anonymous. Fair. Transparent.</p>
        <div style={{marginBottom:32}}>
          <span className={`badge ${isOpen?'badge-success':'badge-warn'}`}>{isOpen?'Voting is Open':'Voting is Closed'}</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <button className="btn btn-gold" style={{padding:16,fontSize:17,borderRadius:12,fontWeight:600}} onClick={onVoter}>
            Cast Your Vote →
          </button>
          <a href="https://forms.office.com/pages/responsepage.aspx?id=vz381wBpeUCYuG8kVfNTO1Hn8ci62hNHs5k-QHfJPj9UQjNLWEpWU1JTT0NLTlNLTVNHQUlJQ0I2SS4u&route=shorturl"
            target="_blank" rel="noopener noreferrer"
            style={{display:'block',padding:'14px',fontSize:15,borderRadius:12,border:'1px solid #233050',color:'#e8eaf0',textAlign:'center',textDecoration:'none',transition:'all .15s',background:'transparent'}}
            onMouseOver={e=>{e.currentTarget.style.borderColor='#f0a500';e.currentTarget.style.color='#f0a500';}}
            onMouseOut={e=>{e.currentTarget.style.borderColor='#233050';e.currentTarget.style.color='#e8eaf0';}}>
            Submit a Nomination ↗
          </a>
          <a href="https://forms.cloud.microsoft/r/16enJp7RvG"
            target="_blank" rel="noopener noreferrer"
            style={{display:'block',padding:'14px',fontSize:15,borderRadius:12,border:'1px solid #233050',color:'#e8eaf0',textAlign:'center',textDecoration:'none',transition:'all .15s',background:'transparent'}}
            onMouseOver={e=>{e.currentTarget.style.borderColor='#f0a500';e.currentTarget.style.color='#f0a500';}}
            onMouseOut={e=>{e.currentTarget.style.borderColor='#233050';e.currentTarget.style.color='#e8eaf0';}}>
            Register To Vote ↗
          </a>
        </div>
      </div>

      {/* Secret admin trigger — click 5× within 2s */}
      <div
        onClick={handleSecretTap}
        style={{position:'fixed',bottom:20,color:'#1e293b',fontSize:12,cursor:'default',userSelect:'none',padding:'6px 12px'}}
        title="">
        {tapCount>0 ? '·'.repeat(tapCount) : 'Your identity is never linked to your choices'}
      </div>
    </div>
  );
}

/* ═══ ADMIN LOGIN ═══ */
function AdminLogin({config,onLogin,onBack}) {
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  function attempt(){ pw===(typeof ADMIN_PASSWORD!=='undefined'?ADMIN_PASSWORD:'admin2026') ? onLogin() : setErr('Incorrect password.'); }
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div className="card" style={{width:'100%',maxWidth:360}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:'#00b8a9',letterSpacing:'2px',fontWeight:600,textTransform:'uppercase',marginBottom:6}}>Admin Access</div>
          <h2 style={{fontSize:22,fontWeight:600}}>Administration Portal</h2>
        </div>
        <div className="form-row">
          <label>Password</label>
          <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&attempt()} placeholder="Enter admin password" autoFocus />
        </div>
        {err && <div className="alert alert-err">{err}</div>}
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-outline" style={{flex:1}} onClick={onBack}>← Back</button>
          <button className="btn btn-primary" style={{flex:2,padding:12}} onClick={attempt}>Sign In</button>
        </div>
      </div>
    </div>
  );
}

/* ═══ ADMIN DASHBOARD ═══ */
function AdminDashboard({positions,setPositions,voters,votes,config,setConfig,onLogout}) {
  const [tab,setTab]=useState('voters');
  const voted=voters.filter(v=>v.hasVoted).length;
  return (
    <div style={{maxWidth:920,margin:'0 auto',padding:'24px 20px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:28,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:12,color:'#00b8a9',letterSpacing:'2px',fontWeight:600,textTransform:'uppercase',marginBottom:4}}>Administration</div>
          <h1 style={{fontSize:24,fontWeight:700}}>{config.electionTitle}</h1>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <span className={`badge ${config.isOpen?'badge-success':'badge-warn'}`}>{config.isOpen?'Voting Open':'Voting Closed'}</span>
          <span className="badge badge-info">{voted} / {voters.length} voted</span>
          <button className="btn btn-outline btn-sm" onClick={onLogout}>Sign Out</button>
        </div>
      </div>
      <div className="tab-bar">
        {[['voters','Voters'],['results','Results'],['setup','Setup']].map(([k,l])=>(
          <button key={k} className={`tab${tab===k?' active':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      {tab==='voters'  && <VoterManagement voters={voters} config={config} />}
      {tab==='results' && <ResultsView positions={positions} votes={votes} voters={voters} config={config} setConfig={setConfig} />}
      {tab==='setup'   && <SetupTab positions={positions} setPositions={setPositions} config={config} setConfig={setConfig} />}
    </div>
  );
}

/* ═══ VOTER MANAGEMENT ═══ */
function VoterManagement({voters, config}) {
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [bulk,setBulk]=useState('');
  const [lastAdded,setLastAdded]=useState(null);
  const [search,setSearch]=useState('');
  const [busy,setBusy]=useState(false);
  const [sending,setSending]=useState({});
  const [bulkSending,setBulkSending]=useState(false);
  const [bulkProgress,setBulkProgress]=useState(null);

  const emailConfigured = !!(config.emailjsServiceId && config.emailjsTemplateId && config.emailjsPublicKey);
  const votersWithEmail = voters.filter(v=>v.email);
  const unsentVoters    = votersWithEmail.filter(v=>!v.emailSent && !v.hasVoted);

  /* add single */
  async function addOne() {
    if(!name.trim()) return;
    setBusy(true);
    const code=genCode();
    const voterData={name:name.trim(),email:email.trim().toLowerCase(),code,approved:true,hasVoted:false,emailSent:false};
    const ref=await FS.addDoc('voters',voterData);
    const added={id:ref.id,...voterData};
    setLastAdded({...added,emailResult:null});
    if(email.trim() && emailConfigured){
      try{
        await sendVoterEmail(added,config);
        await FS.updateDoc('voters',ref.id,{emailSent:true});
        setLastAdded(a=>({...a,emailResult:'ok'}));
      } catch(e){ setLastAdded(a=>({...a,emailResult:e.message})); }
    }
    setName(''); setEmail(''); setBusy(false);
  }

  /* bulk add */
  async function bulkAdd() {
    const lines=bulk.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length) return;
    setBusy(true);
    let sent=0, failed=0;
    for(const line of lines){
      const parts=line.split(',').map(p=>p.trim());
      const n=parts[0], em=(parts[1]||'').toLowerCase();
      const code=genCode();
      const voterData={name:n,email:em,code,approved:true,hasVoted:false,emailSent:false};
      const ref=await FS.addDoc('voters',voterData);
      if(em && emailConfigured){
        try{ await sendVoterEmail({id:ref.id,...voterData},config); await FS.updateDoc('voters',ref.id,{emailSent:true}); sent++; }
        catch(e){ failed++; console.warn('Email failed for',n,e.message); }
      }
    }
    setBulk('');
    if(emailConfigured && (sent||failed)) alert('Bulk add complete.\n'+sent+' email(s) sent.'+(failed?' '+failed+' failed — check console.':''));
    setBusy(false);
  }

  /* send all unsent */
  async function bulkSendAll(){
    if(!emailConfigured){alert('Configure EmailJS in Setup → Email Settings first.');return;}
    if(!unsentVoters.length){alert('No unsent voters with email addresses.');return;}
    if(!confirm('Send codes to '+unsentVoters.length+' voter(s) who have not yet been emailed?')) return;
    setBulkSending(true);
    let done=0, errors=0;
    setBulkProgress({done:0,total:unsentVoters.length,errors:0});
    for(const v of unsentVoters){
      try{ await sendVoterEmail(v,config); await FS.updateDoc('voters',v.id,{emailSent:true}); }
      catch(e){ errors++; console.warn('Email failed for',v.name,e.message); }
      done++;
      setBulkProgress({done,total:unsentVoters.length,errors});
      await new Promise(r=>setTimeout(r,350));
    }
    setBulkSending(false);
    setBulkProgress(null);
    alert('Done! '+(done-errors)+' sent, '+errors+' failed.');
  }

  /* resend single */
  async function resend(v){
    if(!v.email){alert('No email on this voter. Remove and re-add with an email address.');return;}
    if(!emailConfigured){alert('Configure EmailJS in Setup → Email Settings first.');return;}
    setSending(s=>({...s,[v.id]:true}));
    try{ await sendVoterEmail(v,config); await FS.updateDoc('voters',v.id,{emailSent:true}); }
    catch(e){ alert('Send failed: '+e.message); }
    setSending(s=>({...s,[v.id]:false}));
  }

  async function remove(id){ if(!confirm('Remove this voter?')) return; await FS.deleteDoc('voters',id); }
  async function toggle(v){ await FS.updateDoc('voters',v.id,{approved:!v.approved}); }

  const filtered=voters.filter(v=>
    v.name.toLowerCase().includes(search.toLowerCase()) ||
    (v.email||'').toLowerCase().includes(search.toLowerCase()) ||
    v.code.includes(search.toUpperCase())
  );
  const stats={
    total:voters.length,
    approved:voters.filter(v=>v.approved).length,
    voted:voters.filter(v=>v.hasVoted).length,
    emailed:voters.filter(v=>v.emailSent).length,
  };

  return (
    <div>
      {/* email status bar */}
      {emailConfigured ? (
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#0d2015',border:'1px solid #166534',borderRadius:10,padding:'12px 16px',marginBottom:16,flexWrap:'wrap',gap:10}}>
          <div style={{fontSize:13,color:'#4ade80'}}>
            ✓ Email configured &nbsp;·&nbsp;
            <span style={{color:'#94a3b8'}}>{stats.emailed} of {votersWithEmail.length} emailed</span>
            {unsentVoters.length>0 && <span style={{color:'#fbbf24'}}> &nbsp;·&nbsp; {unsentVoters.length} unsent</span>}
          </div>
          <button className="btn btn-sm btn-primary" onClick={bulkSendAll} disabled={bulkSending||!unsentVoters.length}>
            {bulkSending?<><span className="spinner"/>Sending…</>:'✉ Send All Unsent ('+unsentVoters.length+')'}
          </button>
        </div>
      ) : (
        <div className="alert alert-info" style={{marginBottom:16}}>
          Email not configured. Go to <b>Setup → Email Settings</b> to enable automatic code delivery.
        </div>
      )}

      {/* bulk send progress bar */}
      {bulkProgress && (
        <div className="card" style={{marginBottom:16,padding:'14px 18px'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}>
            <span style={{color:'#94a3b8'}}>Sending codes…</span>
            <span style={{fontWeight:500}}>{bulkProgress.done} / {bulkProgress.total}</span>
          </div>
          <div style={{height:8,background:'#1a2236',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',background:'#00b8a9',borderRadius:4,width:Math.round((bulkProgress.done/bulkProgress.total)*100)+'%',transition:'width .3s'}}/>
          </div>
          {bulkProgress.errors>0 && <div style={{fontSize:12,color:'#fca5a5',marginTop:6}}>{bulkProgress.errors} error(s) — check browser console.</div>}
        </div>
      )}

      {/* stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:20}}>
        {[['Total',stats.total,'#00b8a9'],['Approved',stats.approved,'#22c55e'],['Emailed',stats.emailed,'#60a5fa'],['Voted',stats.voted,'#f0a500']].map(([l,v,c])=>(
          <div key={l} className="card" style={{padding:'12px 14px',textAlign:'center'}}>
            <div style={{fontSize:24,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:11,color:'#64748b',marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>

      {/* add forms */}
      <div className="grid2" style={{marginBottom:20}}>
        <div className="card">
          <h3 style={{fontSize:15,fontWeight:600,marginBottom:14}}>Add Single Voter</h3>
          <div className="form-row">
            <label>Full Name</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Voter's full name" />
          </div>
          <div className="form-row">
            <label>Email Address &nbsp;
              {emailConfigured
                ? <span style={{color:'#00b8a9',fontSize:11}}>code will be emailed automatically</span>
                : <span style={{color:'#64748b',fontSize:11}}>optional</span>}
            </label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addOne()} placeholder="voter@example.com" />
          </div>
          <button className="btn btn-primary" style={{width:'100%'}} onClick={addOne} disabled={busy||!name.trim()}>
            {busy?<span className="spinner"/>:emailConfigured&&email.trim()?'Add & Send Code by Email':'Add & Generate Code'}
          </button>
          {lastAdded && (
            <div className="alert alert-ok" style={{marginTop:14,marginBottom:0}}>
              <div style={{fontSize:12,marginBottom:6,color:'#94a3b8'}}>{lastAdded.name}{lastAdded.email?' · '+lastAdded.email:''}</div>
              <div className="mono" style={{fontSize:22,fontWeight:700,letterSpacing:'4px'}}>{lastAdded.code}</div>
              {lastAdded.emailResult==='ok'                           && <div style={{fontSize:12,marginTop:6,color:'#4ade80'}}>✓ Email sent successfully</div>}
              {lastAdded.emailResult&&lastAdded.emailResult!=='ok'    && <div style={{fontSize:12,marginTop:6,color:'#fca5a5'}}>Email failed — {lastAdded.emailResult}</div>}
              {!lastAdded.email                                       && <div style={{fontSize:12,marginTop:6,color:'#64748b'}}>No email — share this code manually</div>}
            </div>
          )}
        </div>

        <div className="card">
          <h3 style={{fontSize:15,fontWeight:600,marginBottom:8}}>Bulk Add</h3>
          <p style={{fontSize:12,color:'#64748b',marginBottom:10,lineHeight:1.7}}>
            One voter per line.<br/>
            With email: <code style={{color:'#00b8a9',fontSize:11}}>Full Name, email@example.com</code><br/>
            Without: <code style={{color:'#64748b',fontSize:11}}>Full Name</code>
          </p>
          <textarea value={bulk} onChange={e=>setBulk(e.target.value)}
            placeholder={"John Smith, john@example.com\nJane Doe, jane@example.com\nAlex Johnson"}
            rows={6} style={{resize:'none'}} />
          <button className="btn btn-outline" style={{width:'100%',marginTop:10}} onClick={bulkAdd} disabled={busy||!bulk.trim()}>
            {busy?<><span className="spinner"/>Adding…</>:emailConfigured?'Add All & Email Where Possible':'Add All Voters'}
          </button>
        </div>
      </div>

      {/* registry */}
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,gap:12,flexWrap:'wrap'}}>
          <h3 style={{fontSize:15,fontWeight:600}}>Registry ({filtered.length})</h3>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, email or code…" style={{width:230}} />
        </div>
        <div className="scroll">
          {filtered.length===0 && <div style={{color:'#64748b',textAlign:'center',padding:'30px 0'}}>{voters.length===0?'No voters yet.':'No results.'}</div>}
          {filtered.map(v=>(
            <div key={v.id} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 0',borderBottom:'1px solid #1a2236'}}>
              <div style={{width:34,height:34,borderRadius:'50%',background:'#1a2236',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:600,color:'#94a3b8',flexShrink:0}}>
                {v.name.charAt(0).toUpperCase()}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.name}</div>
                <div style={{fontSize:12,color:v.email?'#64748b':'#334155',fontStyle:v.email?'normal':'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {v.email||'no email'}
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center',marginTop:2}}>
                  <span className="mono" style={{fontSize:11,color:'#4b5563'}}>{v.code}</span>
                  {v.emailSent && <span style={{fontSize:10,color:'#60a5fa'}}>✉ sent</span>}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
                <span className={`badge ${v.hasVoted?'badge-success':'badge-gray'}`}>{v.hasVoted?'Voted':'Pending'}</span>
                <span className={`badge ${v.approved?'badge-success':'badge-warn'}`}>{v.approved?'OK':'Blocked'}</span>
                {emailConfigured && v.email && (
                  <button className="btn btn-xs btn-outline" onClick={()=>resend(v)} disabled={!!sending[v.id]} title={v.emailSent?'Resend code':'Send code'}>
                    {sending[v.id]?<span className="spinner" style={{width:12,height:12,borderWidth:1.5}}/>:v.emailSent?'↺ Resend':'✉ Send'}
                  </button>
                )}
                <button className="btn btn-xs btn-outline" onClick={()=>toggle(v)}>{v.approved?'Block':'Approve'}</button>
                <button className="btn btn-xs btn-danger" onClick={()=>remove(v.id)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══ RESULTS ═══ */
function ResultsView({positions,votes,voters,config,setConfig}) {
  const [busy,setBusy]=useState(false);
  async function toggleElection(){
    setBusy(true);
    const nc={...config,isOpen:!config.isOpen};
    await FS.setDoc('config','settings',nc); setConfig(nc); setBusy(false);
  }
  async function clearAll(){
    if(!confirm('Clear ALL votes and reset voter statuses? Cannot be undone.')) return;
    setBusy(true); await FS.clearVotes(); await FS.resetVoterStatus(); setBusy(false);
  }
  const votedCount=voters.filter(v=>v.hasVoted).length;
  const turnout=voters.length?Math.round((votedCount/voters.length)*100):0;
  return (
    <div>
      <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap',alignItems:'center'}}>
        {[['Turnout',`${turnout}%`,'#f0a500'],['Votes Cast',votedCount,'#00b8a9'],['Total Voters',voters.length,'#94a3b8']].map(([l,v,c])=>(
          <div key={l} className="card" style={{flex:'1 1 110px',padding:'14px 18px',textAlign:'center'}}>
            <div style={{fontSize:26,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:12,color:'#64748b',marginTop:2}}>{l}</div>
          </div>
        ))}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <button className={`btn btn-sm ${config.isOpen?'btn-danger':'btn-primary'}`} onClick={toggleElection} disabled={busy}>
            {config.isOpen?'Close Voting':'Open Voting'}
          </button>
          <button className="btn btn-outline btn-sm" onClick={clearAll} disabled={busy}>Clear All Votes</button>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {positions.map(pos=>{
          const pv=votes.filter(v=>v.positionId===pos.id);
          const total=pv.length;
          const counts=pos.candidates.map(c=>({...c,count:pv.filter(v=>v.candidateId===c.id).length}));
          const maxC=Math.max(...counts.map(c=>c.count),0);
          return (
            <div key={pos.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <h3 style={{fontSize:15,fontWeight:600}}>{pos.name}</h3>
                <span style={{fontSize:13,color:'#64748b'}}>{total} vote{total!==1?'s':''}</span>
              </div>
              {counts.map(c=>{
                const pct=total?Math.round((c.count/total)*100):0;
                const lead=c.count===maxC&&c.count>0;
                return (
                  <div key={c.id} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:14,color:lead?'#f0a500':'#e8eaf0',fontWeight:lead?600:400}}>{c.name}{lead?' ★':''}</span>
                      <span style={{fontSize:13,color:'#94a3b8'}}>{c.count} ({pct}%)</span>
                    </div>
                    <div style={{height:8,background:'#1a2236',borderRadius:4,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:lead?'#f0a500':'#00b8a9',borderRadius:4,transition:'width .5s ease'}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══ VOTER PORTAL ═══ */
function VoterPortal({positions,config,onBack}) {
  const [phase,setPhase]=useState('code');
  const [codeInput,setCodeInput]=useState('');
  const [err,setErr]=useState('');
  const [voter,setVoter]=useState(null);
  const [selections,setSelections]=useState({});
  const [submitting,setSubmitting]=useState(false);

  async function verifyCode(){
    setErr('');
    if(!config.isOpen){setErr('Voting is currently closed.');return;}
    const snap=await db.collection('voters').where('code','==',codeInput.trim().toUpperCase()).limit(1).get();
    if(snap.empty){setErr('Invalid voter code. Please check with the administrator.');return;}
    const v={id:snap.docs[0].id,...snap.docs[0].data()};
    if(!v.approved){setErr('Your access has been blocked. Contact the administrator.');return;}
    if(v.hasVoted){setErr('This code has already been used to vote.');return;}
    setVoter(v); setPhase('ballot');
  }

  async function submitVotes(){
    const missing=positions.filter(p=>!selections[p.id]);
    if(missing.length){alert(`Please select a candidate for: ${missing.map(p=>p.name).join(', ')}`);return;}
    setSubmitting(true);
    await FS.batchVotes(positions.map(p=>({positionId:p.id,candidateId:selections[p.id]})), voter.id);
    setPhase('done'); setSubmitting(false);
  }

  if(phase==='code') return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:400}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:13,marginBottom:20,display:'flex',alignItems:'center',gap:6}}>← Back</button>
        <div className="card">
          <div style={{marginBottom:20}}>
            <div style={{fontSize:12,color:'#f0a500',letterSpacing:'2px',fontWeight:600,textTransform:'uppercase',marginBottom:6}}>Voter Access</div>
            <h2 style={{fontSize:22,fontWeight:700}}>{config.electionTitle}</h2>
            <p style={{fontSize:13,color:'#64748b',marginTop:6}}>Enter your unique voter code to access the ballot.</p>
          </div>
          {!config.isOpen&&<div className="alert" style={{background:'#2d1d0a',border:'1px solid #92400e',color:'#fbbf24',marginBottom:14}}>Voting is currently closed.</div>}
          <div className="form-row">
            <label>Your Voter Code</label>
            <input value={codeInput} onChange={e=>{setCodeInput(e.target.value.toUpperCase());setErr('');}} onKeyDown={e=>e.key==='Enter'&&verifyCode()} placeholder="e.g. AB12CD" className="mono" style={{fontSize:22,textAlign:'center',fontWeight:700}} maxLength={6} autoFocus />
          </div>
          {err&&<div className="alert alert-err">{err}</div>}
          <button className="btn btn-gold" style={{width:'100%',padding:13,fontSize:15,fontWeight:600}} onClick={verifyCode} disabled={!config.isOpen||!codeInput.trim()}>
            Access Ballot
          </button>
          <p style={{textAlign:'center',fontSize:12,color:'#334155',marginTop:16}}>Your vote is completely anonymous.</p>
        </div>
      </div>
    </div>
  );

  if(phase==='ballot'){
    const done=positions.filter(p=>selections[p.id]).length;
    return (
      <div style={{maxWidth:660,margin:'0 auto',padding:'24px 20px'}}>
        <div style={{marginBottom:22}}>
          <div style={{fontSize:12,color:'#f0a500',letterSpacing:'2px',fontWeight:600,textTransform:'uppercase',marginBottom:6}}>Official Ballot</div>
          <h1 style={{fontSize:22,fontWeight:700}}>{config.electionTitle}</h1>
          <div style={{display:'flex',alignItems:'center',gap:12,marginTop:10}}>
            <div style={{height:6,background:'#1a2236',borderRadius:3,flex:1}}>
              <div style={{height:'100%',background:'#f0a500',borderRadius:3,width:`${(done/positions.length)*100}%`,transition:'width .3s'}}/>
            </div>
            <span style={{fontSize:13,color:'#64748b',flexShrink:0}}>{done}/{positions.length} selected</span>
          </div>
        </div>
        {positions.map((pos,i)=>(
          <div key={pos.id} className="card" style={{marginBottom:12,borderColor:selections[pos.id]?'#00b8a9':'#233050',transition:'border-color .2s'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <div style={{width:24,height:24,borderRadius:'50%',background:selections[pos.id]?'#00b8a9':'#1a2236',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:selections[pos.id]?'#0a0f1e':'#64748b',flexShrink:0,transition:'all .2s'}}>{i+1}</div>
              <h3 style={{fontSize:15,fontWeight:600}}>{pos.name}</h3>
              {selections[pos.id]&&<span style={{fontSize:12,color:'#00b8a9',marginLeft:'auto'}}>✓ Selected</span>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {pos.candidates.map(c=>{
                const chosen=selections[pos.id]===c.id;
                return (
                  <div key={c.id} onClick={()=>setSelections(s=>({...s,[pos.id]:c.id}))}
                    style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:8,border:`1px solid ${chosen?'#00b8a9':'#233050'}`,background:chosen?'#0d2626':'#1a2236',cursor:'pointer',transition:'all .15s',userSelect:'none'}}
                  >
                    <div style={{width:18,height:18,borderRadius:'50%',border:`2px solid ${chosen?'#00b8a9':'#334155'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {chosen&&<div style={{width:8,height:8,borderRadius:'50%',background:'#00b8a9'}}/>}
                    </div>
                    <span style={{fontSize:14,color:chosen?'#00d4c4':'#e8eaf0',fontWeight:chosen?500:400}}>{c.name}</span>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        <div className="card" style={{background:'#0d2015',borderColor:'#166534',textAlign:'center',padding:20,marginTop:4}}>
          <p style={{fontSize:13,color:'#4ade80',marginBottom:14}}>Once submitted your vote cannot be changed. Your identity is never linked to your choices.</p>
          <button className="btn btn-gold" style={{padding:'13px 40px',fontSize:15,fontWeight:600}} onClick={submitVotes} disabled={submitting||done<positions.length}>
            {submitting?<><span className="spinner"/>Submitting…</>:done<positions.length?`${positions.length-done} position(s) remaining`:'Submit My Ballot'}
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',maxWidth:400}}>
        <div style={{width:72,height:72,borderRadius:'50%',background:'#0d3026',border:'2px solid #166534',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,margin:'0 auto 20px'}}>✓</div>
        <h2 style={{fontSize:26,fontWeight:700,color:'#4ade80',marginBottom:8}}>Vote Submitted!</h2>
        <p style={{color:'#64748b',marginBottom:8}}>Your ballot has been recorded anonymously.</p>
        <p style={{fontSize:13,color:'#334155',marginBottom:32}}>Your voter code is now deactivated. Thank you for participating.</p>
        <button className="btn btn-outline" style={{padding:'12px 32px'}} onClick={onBack}>Return to Home</button>
      </div>
    </div>
  );
}

/* ═══ ROOT ═══ */
function App() {
  const [fbReady,setFbReady]=useState(false);
  const [screen,setScreen]=useState('home');
  const [adminAuthed,setAdminAuthed]=useState(false);
  const [loading,setLoading]=useState(true);
  const [config,setConfig]=useState(DEFAULT_CONFIG);
  const [positions,setPositions]=useState(DEFAULT_POSITIONS);
  const [voters,setVoters]=useState([]);
  const [votes,setVotes]=useState([]);
  const unsubs=useRef([]);

  /* Check URL for ?admin shortcut */
  useEffect(()=>{
    if(window.location.search.includes('admin')) setScreen('admin');
  },[]);

  useEffect(()=>{
    if(initFirebase(FIREBASE_CONFIG)) setFbReady(true);
    else setLoading(false);
  },[]);

  useEffect(()=>{
    if(!fbReady) return;
    async function seed(){
      const cfgDoc=await FS.getDoc('config','settings');
      const posDoc=await FS.getDoc('positions','data');
      if(!cfgDoc) await FS.setDoc('config','settings',DEFAULT_CONFIG);
      if(!posDoc) await FS.setDoc('positions','data',{positions:DEFAULT_POSITIONS});
    }
    seed().then(()=>{
      const u1=FS.onDoc('config','settings',d=>{ if(d) setConfig(d); });
      const u2=FS.onDoc('positions','data',d=>{ if(d&&d.positions) setPositions(d.positions); });
      const u3=FS.onCol('voters',docs=>setVoters(docs));
      const u4=FS.onCol('votes',docs=>setVotes(docs));
      unsubs.current=[u1,u2,u3,u4];
      setLoading(false);
    });
    return ()=>unsubs.current.forEach(u=>u&&u());
  },[fbReady]);

  if(!fbReady) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',maxWidth:440}}>
        <div style={{fontSize:32,marginBottom:16}}>⚠️</div>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:8,color:'#fbbf24'}}>Firebase not configured</h2>
        <p style={{color:'#64748b',fontSize:14,lineHeight:1.7}}>Open <code style={{color:'#00b8a9',background:'#1a2236',padding:'2px 6px',borderRadius:4}}>config.js</code> and replace each placeholder with your Firebase project values.</p>
      </div>
    </div>
  );
  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <span className="spinner" style={{width:36,height:36,borderWidth:3}}/>
      <div style={{color:'#64748b',fontSize:14}}>Connecting to Firebase…</div>
    </div>
  );
  if(screen==='home') return <HomeScreen electionTitle={config.electionTitle} isOpen={config.isOpen} onAdmin={()=>setScreen('admin')} onVoter={()=>setScreen('voter')} />;
  if(screen==='admin'){
    if(!adminAuthed) return <AdminLogin config={config} onLogin={()=>setAdminAuthed(true)} onBack={()=>setScreen('home')} />;
    return <AdminDashboard positions={positions} setPositions={setPositions} voters={voters} votes={votes} config={config} setConfig={setConfig} onLogout={()=>{setAdminAuthed(false);setScreen('home');}} />;
  }
  if(screen==='voter') return <VoterPortal positions={positions} config={config} onBack={()=>setScreen('home')} />;
  return null;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
